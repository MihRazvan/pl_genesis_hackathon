<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">

  <rect width="1200" height="320" fill="#17221c"/>
  <rect width="1200" height="320" fill="none" stroke="#2a3a2e" stroke-width="3"/>

  <text x="600" y="52" font-size="13" font-weight="700" fill="#4a7055" text-anchor="middle" letter-spacing="0.16em">ON-CHAIN TRUST MODEL</text>
  <text x="600" y="84" font-size="28" font-weight="700" fill="#e8e0d0" text-anchor="middle">Anyone can verify. Nobody can decrypt.</text>

  <!-- CARD 1: VERIFIABLE -->
  <rect x="60" y="116" width="330" height="168" rx="16" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="2"/>
  <rect x="80" y="136" width="36" height="36" rx="10" fill="#1a3a1a"/>
  <circle cx="98" cy="154" r="10" fill="none" stroke="#6aaa6a" stroke-width="1.5"/>
  <path d="M93 154l3 3 6-6" stroke="#6aaa6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="126" y="148" font-size="10" font-weight="700" fill="#3a7a3a" letter-spacing="0.12em">PUBLICLY VERIFIABLE</text>
  <text x="126" y="166" font-size="14" font-weight="700" fill="#6aaa6a">Bucket events on-chain</text>
  <text x="80" y="198" font-size="12" fill="#4a7a4a">Every increment is a real Sepolia</text>
  <text x="80" y="215" font-size="12" fill="#4a7a4a">transaction. Anyone can query it.</text>
  <rect x="80" y="232" width="290" height="36" rx="8" fill="#0e220e"/>
  <text x="96" y="248" font-size="10" fill="#3a6a3a" font-family="monospace">event QueryBucketIncremented</text>
  <text x="96" y="262" font-size="10" fill="#5aaa5a" font-family="monospace">bucket: 0xf79bed9d...f58631</text>

  <!-- CARD 2: ENCRYPTED -->
  <rect x="435" y="116" width="330" height="168" rx="16" fill="#120a1e" stroke="#3a1a6a" stroke-width="2"/>
  <rect x="455" y="136" width="36" height="36" rx="10" fill="#2a1a4a"/>
  <rect x="463" y="146" width="20" height="14" rx="3" fill="none" stroke="#a07acc" stroke-width="1.5"/>
  <path d="M468 146v-4a7 7 0 0114 0v4" stroke="#a07acc" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <circle cx="473" cy="153" r="1.5" fill="#a07acc"/>
  <text x="501" y="148" font-size="10" font-weight="700" fill="#7a3aaa" letter-spacing="0.12em">ENCRYPTED ON-CHAIN</text>
  <text x="501" y="166" font-size="14" font-weight="700" fill="#a07acc">fhEVM write-only log</text>
  <text x="455" y="198" font-size="12" fill="#5a3a8a">Stored as euint32 via Zama fhEVM.</text>
  <text x="455" y="215" font-size="12" fill="#5a3a8a">Logger cannot decrypt it back.</text>
  <rect x="455" y="232" width="290" height="36" rx="8" fill="#180a2a"/>
  <text x="471" y="248" font-size="10" fill="#4a2a6a" font-family="monospace">count: [encrypted euint32]</text>
  <text x="471" y="262" font-size="10" fill="#9a6acc" font-family="monospace">ACL: write-only · decrypt: false</text>

  <!-- CARD 3: PSEUDONYMOUS -->
  <rect x="810" y="116" width="330" height="168" rx="16" fill="#1a1200" stroke="#5a4000" stroke-width="2"/>
  <rect x="830" y="136" width="36" height="36" rx="10" fill="#3a2800"/>
  <path d="M848 140l2 6h6l-5 3.5 2 6-5-3.5-5 3.5 2-6-5-3.5h6z" fill="none" stroke="#c8a030" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="876" y="148" font-size="10" font-weight="700" fill="#8a6a00" letter-spacing="0.12em">PSEUDONYMOUS</text>
  <text x="876" y="166" font-size="14" font-weight="700" fill="#c8a030">No raw addresses stored</text>
  <text x="830" y="198" font-size="12" fill="#7a6030">Bucket ID is hash(salt + address).</text>
  <text x="830" y="215" font-size="12" fill="#7a6030">Salt is server-side. Hash is one-way.</text>
  <rect x="830" y="232" width="290" height="36" rx="8" fill="#1e1600"/>
  <text x="846" y="248" font-size="10" fill="#5a4a00" font-family="monospace">bucket: hash(salt + address)</text>
  <text x="846" y="262" font-size="10" fill="#c8a030" font-family="monospace">raw wallet addr: never stored</text>
</svg>
